<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор | Проект для портфолио</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .calculator {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .display {
            background: #f0f0f0;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: right;
            font-size: 2em;
            font-weight: 600;
            color: #333;
            word-wrap: break-word;
            min-height: 80px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            padding: 20px;
            font-size: 1.2em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
            font-weight: 600;
        }

        button:active {
            transform: scale(0.97);
        }

        .number {
            background: #f8f9fa;
            color: #333;
        }

        .number:hover {
            background: #e9ecef;
        }

        .operator {
            background: #667eea;
            color: white;
        }

        .operator:hover {
            background: #5a67d8;
        }

        .equals {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            grid-column: span 2;
        }

        .clear {
            background: #ff6b6b;
            color: white;
        }

        .clear:hover {
            background: #ff5252;
        }

        .zero {
            grid-column: span 2;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.8em;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>🧮 Калькулятор</h1>
        <div class="display" id="display">0</div>
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="operator" onclick="appendOperator('/')">÷</button>
            <button class="operator" onclick="appendOperator('*')">×</button>
            <button class="operator" onclick="appendOperator('-')">−</button>
            
            <button class="number" onclick="appendNumber('7')">7</button>
            <button class="number" onclick="appendNumber('8')">8</button>
            <button class="number" onclick="appendNumber('9')">9</button>
            <button class="operator" onclick="appendOperator('+')">+</button>
            
            <button class="number" onclick="appendNumber('4')">4</button>
            <button class="number" onclick="appendNumber('5')">5</button>
            <button class="number" onclick="appendNumber('6')">6</button>
            <button class="equals" onclick="calculate()">=</button>
            
            <button class="number" onclick="appendNumber('1')">1</button>
            <button class="number" onclick="appendNumber('2')">2</button>
            <button class="number" onclick="appendNumber('3')">3</button>
            <button class="equals" style="grid-row: span 2;" onclick="calculate()">=</button>
            
            <button class="number zero" onclick="appendNumber('0')">0</button>
            <button class="number" onclick="appendNumber('.')">.</button>
            <button class="equals" onclick="calculate()">=</button>
        </div>
        <div class="footer">
            <p>Кликните на кнопку или нажмите клавишу</p>
        </div>
    </div>

    <script>
        // ========== ПЕРЕМЕННЫЕ ==========
        let currentInput = '0';
        let previousInput = '';
        let operator = null;
        let waitingForOperand = false;

        // ========== ОБНОВЛЕНИЕ ДИСПЛЕЯ ==========
        function updateDisplay() {
            const display = document.getElementById('display');
            display.textContent = currentInput;
        }

        // ========== ДОБАВЛЕНИЕ ЦИФР ==========
        function appendNumber(num) {
            if (waitingForOperand) {
                currentInput = num;
                waitingForOperand = false;
            } else {
                if (currentInput === '0' && num !== '.') {
                    currentInput = num;
                } else {
                    currentInput += num;
                }
            }
            updateDisplay();
        }

        // ========== ДОБАВЛЕНИЕ ОПЕРАТОРА ==========
        function appendOperator(op) {
            if (operator && !waitingForOperand) {
                calculate();
            }
            previousInput = currentInput;
            operator = op;
            waitingForOperand = true;
        }

        // ========== ВЫЧИСЛЕНИЕ ==========
        function calculate() {
            if (!operator || waitingForOperand) return;
            
            const prev = parseFloat(previousInput);
            const current = parseFloat(currentInput);
            
            if (isNaN(prev) || isNaN(current)) return;
            
            let result = 0;
            
            switch (operator) {
                case '+':
                    result = prev + current;
                    break;
                case '-':
                    result = prev - current;
                    break;
                case '*':
                    result = prev * current;
                    break;
                case '/':
                    if (current === 0) {
                        alert('На ноль делить нельзя!');
                        clearDisplay();
                        return;
                    }
                    result = prev / current;
                    break;
                default:
                    return;
            }
            
            currentInput = result.toString();
            operator = null;
            waitingForOperand = true;
            updateDisplay();
        }

        // ========== ОЧИСТКА ==========
        function clearDisplay() {
            currentInput = '0';
            previousInput = '';
            operator = null;
            waitingForOperand = false;
            updateDisplay();
        }

        // ========== КЛАВИАТУРА ==========
        document.addEventListener('keydown', function(event) {
            const key = event.key;
            
            if (key >= '0' && key <= '9') {
                appendNumber(key);
            } else if (key === '.') {
                appendNumber('.');
            } else if (key === '+' || key === '-' || key === '*' || key === '/') {
                let displayOp = key;
                if (key === '*') displayOp = '*';
                if (key === '/') displayOp = '/';
                appendOperator(displayOp);
            } else if (key === 'Enter' || key === '=') {
                calculate();
            } else if (key === 'Escape' || key === 'c' || key === 'C') {
                clearDisplay();
            }
        });

        // Начальное отображение
        updateDisplay();
    </script>
</body>
</html>
